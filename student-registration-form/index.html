<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
<h1>Student Registration Form</h1>
<form action="post">
<label for="name">Enter Your Name:</label>
<input type="text" id="name" name="name" placeholder="Enter Your Username" autofocus>
<br><br>
<label for="Male">Male</label>
<input type="radio" id="Male" name="Gender">
<label for="Female">Female</label>
<input type="radio" id="Female" name="Gender">
<br><br>
<label for="Hobbies">Hobbies:</label><br>
<input type="checkbox" name="" id=""> Reading <br>
<input type="checkbox" name="" id=""> Sports <br>
<input type="checkbox" name="" id=""> Music <br><br>

<label>Select Course</label><br>
<Select>
    <option value="MCA">MCA</option>
    <option value="BSC">B.SC</option>
    <option value="CSE">CSE</option>
    <option value="BCA">BCA</option>
</Select>

<br><br>
<label>Date Of Birth :</label><br>
<input type="date">
<br><br>
<label>Address:</label><br>
<textarea rows="4" cols="30">Enter Your Address Here....</textarea>
<br><br>
<label>Upload Photo:</label><br>
<input type="file">
<br><br>
<input type="submit" value="Register">
</form>
</body>
</html>
